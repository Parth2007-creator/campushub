<!DOCTYPE html>
<html>
<head>
  <title>Store Item</title>
</head>
<body>

<h2>Store Item</h2>

<input type="file" id="photo">
<input type="text" id="prn" placeholder="Enter PRN">
<input type="text" id="email" placeholder="Enter Email">

<button onclick="store()">Store</button>

<script type="module">

import { db, storage, rtdb } from './firebase.js';
import { collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';
import { set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

async function store() {

  const file = document.getElementById("photo").files[0];
  const prn = document.getElementById("prn").value;
  const email = document.getElementById("email").value;

  const storageRef = ref(storage, "items/" + Date.now());

  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "lostAndFound"), {
    studentPRN: prn,
    studentEmailId: email,
    itemPhotoUrl: url,
    storedAt: serverTimestamp(),
    status: "stored"
  });

  // 🔥 OPEN LOCKER
  await set(ref(rtdb, "commands"), {
    action: "open"
  });

  alert("Stored + Opened 🔥");
}

window.store = store;

</script>

</body>
</html>
